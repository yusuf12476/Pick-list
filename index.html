<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Pick List</title>
<meta name="description" content="A fast, offline-friendly shopping list.">
<meta name="theme-color" content="#23211C">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pick List">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --paper:#FAF7F0;
    --paper-shadow:#E8E2D4;
    --ink:#2B2B2B;
    --ink-soft:#6B6660;
    --line:#EDE7D9;
    --line-strong:#D8D1C0;
    --check:#6B8F71;
    --remove:#C1666B;
    --gold:#C99A3E;
    --bg-top:#EFEAE0;
    --bg-bottom:#E2DCCD;
    --chip-bg:#F1ECE0;
    --sidebar-bg:#23211C;
    --sidebar-ink:#EFE9DC;
    --sidebar-ink-soft:#9A9182;
    --sidebar-line:#37352C;
  }

  body.dark{
    --paper:#1B1A16;
    --paper-shadow:#121110;
    --ink:#EFE9DC;
    --ink-soft:#9A9182;
    --line:#322F27;
    --line-strong:#423E33;
    --check:#7FAF87;
    --remove:#D98088;
    --gold:#D8B567;
    --bg-top:#1B1A16;
    --bg-bottom:#1B1A16;
    --chip-bg:#262420;
    --sidebar-bg:#100F0C;
    --sidebar-line:#262420;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    overflow:hidden;
    background:var(--bg-top);
    font-family:'Inter',sans-serif;
    color:var(--ink);
    transition:background .3s ease, color .3s ease;
  }

  .app{
    display:grid;
    grid-template-columns:248px 1fr;
    height:100vh;
    height:100dvh;
  }

  /* ===== sidebar ===== */
  .sidebar{
    background:var(--sidebar-bg);
    color:var(--sidebar-ink);
    display:flex;
    flex-direction:column;
    padding:22px 16px;
    overflow-y:auto;
  }
  .brand{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--sidebar-ink-soft);
    margin-bottom:24px;
  }
  .sidebar-section-label{
    font-family:'Space Mono',monospace;
    font-size:10px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--sidebar-ink-soft);
    margin:0 0 10px 2px;
  }
  .tabs{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .tab{
    text-align:left;
    font-family:'Space Mono',monospace;
    font-size:13px;
    letter-spacing:.02em;
    padding:10px 12px;
    background:none;
    color:var(--sidebar-ink-soft);
    border:none;
    border-left:2px solid transparent;
    cursor:pointer;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    transition:all .15s ease;
  }
  .tab:hover{ color:var(--sidebar-ink); background:rgba(255,255,255,.04); }
  .tab.active{
    color:var(--gold);
    border-left-color:var(--gold);
    background:rgba(201,154,62,.08);
  }
  .tab.new{
    color:var(--sidebar-ink-soft);
    border:1px dashed var(--sidebar-line);
    margin-top:8px;
  }
  .tab.new:hover{ color:var(--gold); border-color:var(--gold); }

  .tab-wrap{ display:flex; align-items:stretch; }
  .tab-wrap .tab{ flex:1; }
  .tab-edit{
    border:none; background:none;
    color:var(--sidebar-ink-soft);
    font-family:'Space Mono',monospace;
    font-size:14px;
    cursor:pointer;
    padding:10px 10px;
    opacity:.55;
    flex:0 0 auto;
  }
  .tab-edit:hover{ opacity:1; color:var(--gold); }

  .install-btn{
    margin-top:14px;
    width:100%;
    background:rgba(201,154,62,.12);
    border:1px solid var(--gold);
    color:var(--gold);
    font-family:'Space Mono',monospace;
    font-size:11.5px;
    letter-spacing:.03em;
    padding:10px 8px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .install-btn:hover{ background:rgba(201,154,62,.22); }

  .sidebar-footer{
    margin-top:auto;
    padding-top:18px;
    border-top:1px solid var(--sidebar-line);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .icon-btn{
    border:none;
    background:none;
    cursor:pointer;
    color:var(--sidebar-ink-soft);
    font-size:16px;
    padding:4px;
    line-height:1;
    transition:color .15s ease;
  }
  .icon-btn:hover{ color:var(--gold); }
  .sidebar-foot-label{
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    color:var(--sidebar-ink-soft);
  }

  /* ===== main ===== */
  .main{
    display:flex;
    flex-direction:column;
    height:100%;
    overflow:hidden;
    background:linear-gradient(180deg,var(--bg-top),var(--bg-bottom));
  }

  .main-header{
    flex:0 0 auto;
    padding:28px clamp(20px,4vw,64px) 16px;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    transition:background .3s ease;
  }

  .header-top-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
  }
  h1{
    font-family:'Space Mono',monospace;
    font-size:clamp(22px,3.4vw,32px);
    margin:0 0 4px;
    letter-spacing:.01em;
  }
  .date{
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    margin:0;
  }

  .progress-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:16px;
    max-width:420px;
  }
  .progress-track{
    flex:1;
    height:5px;
    background:var(--line);
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:var(--check);
    transition:width .35s ease;
  }
  .progress-pct{
    font-family:'Space Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    min-width:32px;
    text-align:right;
  }

  .search-row{
    margin-top:16px;
    position:relative;
    max-width:340px;
  }
  #searchInput{
    width:100%;
    padding:9px 30px 9px 12px;
    font-size:13px;
    border:1px solid var(--line-strong);
    background:var(--chip-bg);
    color:var(--ink);
    outline:none;
  }
  #searchInput:focus{ border-color:var(--gold); }
  .search-clear{
    position:absolute;
    right:8px; top:50%;
    transform:translateY(-50%);
    border:none; background:none;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:13px;
    display:none;
  }

  /* ===== scroll area ===== */
  .scroll-area{
    flex:1;
    overflow-y:auto;
    padding:8px clamp(20px,4vw,64px) 120px;
  }
  .scroll-inner{
    max-width:760px;
  }

  .category-block{ margin-top:22px; }
  .category-block:first-child{ margin-top:18px; }
  .category-title{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--gold);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
  }
  .category-title::after{
    content:"";
    flex:1;
    border-top:1px solid var(--line);
  }

  ul{ list-style:none; margin:0; padding:0; }

  li{
    display:flex;
    align-items:center;
    gap:10px;
    padding:11px 4px;
    border-bottom:1px solid var(--line);
    position:relative;
  }

  .li-content{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    background:transparent;
    position:relative;
  }

  .check{
    width:19px; height:19px; flex:0 0 19px;
    border:1.5px solid var(--line-strong);
    cursor:pointer;
    position:relative;
    background:var(--paper);
    transition:background .15s ease, border-color .15s ease;
  }
  .check.done{ background:var(--check); border-color:var(--check); }
  .check.done::after{
    content:"";
    position:absolute; left:5px; top:1px;
    width:5px; height:9px;
    border:solid white;
    border-width:0 2px 2px 0;
    transform:rotate(40deg);
  }

  .item-main{ flex:1; min-width:0; cursor:pointer; }
  .item-name{ font-size:15px; word-break:break-word; }
  li.done .item-name{ text-decoration:line-through; color:var(--ink-soft); }
  .item-price{ font-family:'Space Mono',monospace; font-size:10.5px; color:var(--ink-soft); margin-top:2px; }

  .qty-stepper{
    display:flex; align-items:center; gap:0;
    flex:0 0 auto;
    border:1px solid var(--line-strong);
  }
  .qty-stepper button{
    border:none; background:none;
    width:24px; height:24px;
    font-family:'Space Mono',monospace;
    font-size:13px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .qty-stepper button:hover{ color:var(--ink); }
  .qty-val{
    font-family:'Space Mono',monospace;
    font-size:12px;
    min-width:20px;
    text-align:center;
  }

  .edit-btn{
    border:none; background:none;
    color:var(--ink-soft);
    font-family:'Space Mono',monospace;
    font-size:14px;
    cursor:pointer;
    opacity:.55;
    padding:2px 4px;
    flex:0 0 auto;
  }
  .edit-btn:hover{ opacity:1; color:var(--gold); }

  .remove{
    border:none; background:none;
    color:var(--remove);
    font-family:'Space Mono',monospace;
    font-size:14px;
    cursor:pointer;
    opacity:.55;
    padding:2px 4px;
    flex:0 0 auto;
  }
  .remove:hover{ opacity:1; }

  .edit-row{
    width:100%;
    padding:8px 0 12px;
    display:flex;
    flex-direction:column;
    gap:10px;
    background:var(--chip-bg);
    margin:2px -10px;
    padding-left:10px;
    padding-right:10px;
  }
  .edit-fields-row{
    display:flex;
    gap:8px;
  }
  .edit-fields-row input{
    border:1px solid var(--gold);
    background:var(--paper);
    color:var(--ink);
    padding:9px 10px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    outline:none;
  }
  .edit-name{ flex:1; min-width:0; }
  .edit-qty{ width:56px; }
  .edit-price{ width:70px; }
  .edit-category-row{ display:flex; }
  .edit-category{
    flex:1;
    border:1px solid var(--gold);
    background:var(--paper);
    color:var(--ink);
    padding:9px 10px;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    outline:none;
  }
  .edit-btn-row{
    display:flex;
    gap:8px;
    justify-content:flex-end;
  }
  .edit-btn-row button{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:.04em;
    padding:8px 14px;
    border:1px solid var(--line-strong);
    background:none;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .edit-save{
    background:var(--ink) !important;
    color:var(--paper) !important;
    border-color:var(--ink) !important;
  }
  .edit-cancel:hover{ border-color:var(--remove); color:var(--remove); }

  .empty{
    text-align:center;
    color:var(--ink-soft);
    font-family:'Space Mono',monospace;
    font-size:12.5px;
    padding:50px 0 8px;
  }

  /* ===== bottom bar ===== */
  .bottom-bar{
    flex:0 0 auto;
    padding:14px clamp(20px,4vw,64px) calc(16px + env(safe-area-inset-bottom));
    background:var(--paper);
    border-top:1px solid var(--line);
    box-shadow:0 -10px 30px -20px rgba(0,0,0,.3);
  }
  .bottom-inner{
    max-width:760px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .stats-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-family:'Space Mono',monospace;
  }
  .total-label{ font-size:11px; color:var(--ink-soft); letter-spacing:.05em; }
  .total-value{ font-size:18px; font-weight:700; }
  .cost-total{ font-size:11.5px; color:var(--ink-soft); }

  form.add-form{
    display:flex;
    gap:8px;
  }
  input[type="text"], input[type="number"]{
    border:1px solid var(--line-strong);
    background:var(--paper);
    color:var(--ink);
    padding:12px 13px;
    font-family:'Inter',sans-serif;
    font-size:14.5px;
    outline:none;
    transition:border-color .15s ease;
  }
  input[type="text"]:focus, input[type="number"]:focus{ border-color:var(--gold); }
  #itemInput{ flex:1; min-width:0; }
  #priceInput{ width:76px; }

  button.add{
    border:none;
    background:var(--ink);
    color:var(--paper);
    font-family:'Space Mono',monospace;
    font-size:13px;
    letter-spacing:.04em;
    padding:0 18px;
    cursor:pointer;
    transition:opacity .15s ease;
  }
  button.add:hover{ opacity:.85; }

  .actions-row{
    display:flex;
    gap:8px;
  }
  .ghost-btn{
    flex:1;
    background:none;
    border:1px solid var(--line-strong);
    color:var(--ink-soft);
    font-family:'Space Mono',monospace;
    font-size:10.5px;
    letter-spacing:.04em;
    padding:9px 6px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .ghost-btn:hover{ border-color:var(--ink); color:var(--ink); }
  .ghost-btn.danger:hover{ border-color:var(--remove); color:var(--remove); }

  /* ===== toast ===== */
  .toast{
    position:fixed;
    bottom:24px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:var(--paper);
    font-family:'Space Mono',monospace;
    font-size:12.5px;
    padding:11px 16px;
    display:flex;
    align-items:center;
    gap:14px;
    opacity:0;
    pointer-events:none;
    transition:all .25s ease;
    z-index:80;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); pointer-events:auto; }
  .toast button{
    background:none; border:none;
    color:var(--gold);
    font-family:'Space Mono',monospace;
    font-size:12.5px;
    cursor:pointer;
    font-weight:700;
  }

  .confetti{ position:fixed; top:0; left:0; pointer-events:none; z-index:90; }

  /* ===== modal ===== */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(0,0,0,.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:20px;
  }
  .modal-overlay.show{ display:flex; }
  .modal{
    background:var(--paper);
    padding:24px;
    max-width:320px;
    width:100%;
  }
  .modal h2{ font-family:'Space Mono',monospace; font-size:14px; margin:0 0 14px; color:var(--ink); }
  .modal input{ width:100%; margin-bottom:14px; }
  .modal-row{ display:flex; gap:8px; }
  .modal-row button{
    flex:1; padding:10px;
    border:1px solid var(--line-strong);
    background:none;
    font-family:'Space Mono',monospace;
    font-size:12px;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .modal-row button.primary{ background:var(--ink); color:var(--paper); border-color:var(--ink); }

  /* ===== mobile layout ===== */
  .mobile-tab-toggle{ display:none; }

  @media (max-width:860px){
    .app{ grid-template-columns:1fr; grid-template-rows:auto 1fr; }
    .sidebar{
      flex-direction:row;
      align-items:center;
      padding:14px 14px;
      overflow-x:auto;
      overflow-y:hidden;
      gap:10px;
    }
    .brand{ display:none; }
    .sidebar-section-label{ display:none; }
    .tabs{ flex-direction:row; gap:6px; }
    .tab-wrap{
      flex:0 0 auto;
      border:1px solid var(--sidebar-line);
    }
    .tab-wrap.active{ border-color:var(--gold); background:rgba(201,154,62,.12); }
    .tab{
      border-left:none;
      border:none;
      padding:8px 4px 8px 13px;
      flex:0 0 auto;
      background:none !important;
    }
    .tab-edit{ padding:8px 10px 8px 4px; }
    .sidebar-footer{
      margin-top:0;
      padding-top:0;
      border-top:none;
      flex:0 0 auto;
      margin-left:4px;
    }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">Sunrise &middot; Pick List</div>
    <div class="sidebar-section-label">Your lists</div>
    <nav class="tabs" id="tabs"></nav>
    <button class="install-btn" id="installBtn" style="display:none;">⭳ Install app</button>
    <div class="sidebar-footer">
      <span class="sidebar-foot-label" id="syncLabel">Theme</span>
      <button class="icon-btn" id="themeToggle" title="Toggle theme">◐</button>
    </div>
  </aside>

  <main class="main">
    <header class="main-header">
      <div class="header-top-row">
        <div>
          <h1 id="listTitle">THINGS TO BUY</h1>
          <p class="date" id="date"></p>
        </div>
      </div>
      <div class="progress-row">
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Search this list…">
        <button class="search-clear" id="searchClear">✕</button>
      </div>
    </header>

    <div class="scroll-area">
      <div class="scroll-inner">
        <div id="listBody"></div>
        <p class="empty" id="emptyMsg" style="display:none;">List's empty. Add something below.</p>
      </div>
    </div>

    <footer class="bottom-bar">
      <div class="bottom-inner">
        <div class="stats-row">
          <div>
            <div class="total-label">ITEMS REMAINING</div>
            <div class="cost-total" id="costTotal"></div>
          </div>
          <span class="total-value" id="remainingCount">0</span>
        </div>
        <form class="add-form" id="addForm">
          <input type="text" id="itemInput" placeholder="Add an item…" autocomplete="off">
          <input type="number" id="priceInput" placeholder="$" step="0.01" min="0">
          <button type="submit" class="add">ADD</button>
        </form>
        <div class="actions-row">
          <button class="ghost-btn" id="shareBtn">SHARE / COPY</button>
          <button class="ghost-btn danger" id="clearDoneBtn">CLEAR CHECKED</button>
        </div>
      </div>
    </footer>
  </main>
</div>

<div class="toast" id="toast">
  <span id="toastMsg"></span>
  <button id="toastUndo">UNDO</button>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">New list</h2>
    <input type="text" id="modalInput" placeholder="List name">
    <div class="modal-row" id="modalDeleteRow" style="display:none; margin-bottom:8px;">
      <button id="modalDelete" class="ghost-btn danger" style="width:100%; flex:1;">DELETE THIS LIST</button>
    </div>
    <div class="modal-row">
      <button id="modalCancel">CANCEL</button>
      <button class="primary" id="modalConfirm">SAVE</button>
    </div>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'pick-list-cache-v1'; // offline fallback only — Supabase is the source of truth

  const SUPABASE_URL = 'https://bqqvkzddvtpzimnpbjuw.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJxcXZremRkdnRwemltbnBianV3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NzgwNjksImV4cCI6MjA4OTA1NDA2OX0.plUF3ui7PkafjSqHK5FdftSNBXnQz0Jp9O7Cv1yvyfs';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Each rule has whole-word keys (matched with \b so "can" never matches "candle")
  // and phrase keys (matched as substrings, safe because they're multi-word and specific).
  const CATEGORY_RULES = [
    { name: 'Produce', icon: '🥬', words: ['apple','apples','banana','bananas','onion','onions','tomato','tomatoes','potato','potatoes','carrot','carrots','lettuce','spinach','garlic','pepper','peppers','avocado','avocados','lemon','lemons','lime','limes','fruit','vegetable','vegetables','cucumber','mango','mangoes','berries','berry','kale','cabbage'], phrases:[] },
    { name: 'Dairy & Eggs', icon: '🥚', words: ['milk','cheese','egg','eggs','yogurt','butter','cream','margarine'], phrases:[] },

    { name: 'Bakery', icon: '🍞', words: ['bread','bun','buns','flour','yeast','cake','pastry','dough','chapati','mandazi'], phrases:[] },

    { name: 'Farm & Feed', icon: '🐐', words: ['feed','vaccine','dewormer','hay','straw'], phrases:['salt lick'] },
  ];
  const CATEGORY_ORDER = CATEGORY_RULES.map(c => c.name).concat(['Other']);

  // Learned corrections: normalized item name -> category name. Always wins over keyword guessing.
  let categoryOverrides = {};
  function normalizeName(name){ return name.trim().toLowerCase().replace(/\s+/g,' '); }

  function guessCategory(name){
    const lower = ' ' + name.toLowerCase() + ' ';
    for (const cat of CATEGORY_RULES){
      if (cat.phrases.some(p => lower.includes(p))) return cat;
      if (cat.words.some(w => new RegExp('\\b' + w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b').test(lower))) return cat;
    }
    return { name: 'Other', icon: '🛒' };
  }

  function categorize(name){
    const key = normalizeName(name);
    const learned = categoryOverrides[key];
    if (learned){
      const rule = CATEGORY_RULES.find(c => c.name === learned);
      if (rule) return rule;
      if (learned === 'Other') return { name: 'Other', icon: '🛒' };
    }
    return guessCategory(name);
  }

  async function loadCategoryOverrides(){
    try{
      const { data, error } = await sb.from('category_overrides').select('item_name,category');
      if (error) throw error;
      categoryOverrides = {};
      (data || []).forEach(row => { categoryOverrides[row.item_name] = row.category; });
    }catch(e){ console.warn('Could not load category overrides', e); }
  }

  async function setCategoryOverride(name, category){
    const key = normalizeName(name);
    categoryOverrides[key] = category;
    renderList();
    const { error } = await sb.from('category_overrides').upsert({ item_name: key, category }, { onConflict: 'item_name' });
    if (error){ console.error(error); showToast('Category saved locally only — sync failed'); }
  }

  function parseQtyName(raw){
    const m = raw.match(/^(\d+)\s*[xX]\s*(.+)$/);
    if (m) return { qty: parseInt(m[1],10), name: m[2].trim() };
    return { qty: 1, name: raw.trim() };
  }

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  let state = { lists: [], activeListId: null };
  let toastTimer = null;
  let modalMode = null;
  let editingId = null;
  let manageListId = null;

  const el = {
    tabs: document.getElementById('tabs'),
    listTitle: document.getElementById('listTitle'),
    date: document.getElementById('date'),
    progressFill: document.getElementById('progressFill'),
    progressPct: document.getElementById('progressPct'),
    addForm: document.getElementById('addForm'),
    itemInput: document.getElementById('itemInput'),
    priceInput: document.getElementById('priceInput'),
    searchInput: document.getElementById('searchInput'),
    searchClear: document.getElementById('searchClear'),
    listBody: document.getElementById('listBody'),
    emptyMsg: document.getElementById('emptyMsg'),
    remainingCount: document.getElementById('remainingCount'),
    costTotal: document.getElementById('costTotal'),
    shareBtn: document.getElementById('shareBtn'),
    clearDoneBtn: document.getElementById('clearDoneBtn'),
    themeToggle: document.getElementById('themeToggle'),
    toast: document.getElementById('toast'),
    toastMsg: document.getElementById('toastMsg'),
    toastUndo: document.getElementById('toastUndo'),
    modalOverlay: document.getElementById('modalOverlay'),
    modalTitle: document.getElementById('modalTitle'),
    modalInput: document.getElementById('modalInput'),
    modalCancel: document.getElementById('modalCancel'),
    modalConfirm: document.getElementById('modalConfirm'),
    modalDeleteRow: document.getElementById('modalDeleteRow'),
    modalDelete: document.getElementById('modalDelete'),
  };

  el.date.textContent = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  function defaultState(){
    return { lists: [{ id: uid(), name: 'Groceries', items: [] }], activeListId: null };
  }

  let themeMem = localStorage.getItem('pick-list-theme');

  function cacheLocally(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    catch(e){ /* ignore quota errors */ }
  }

  function loadFromCache(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw){ state = JSON.parse(raw); return true; }
    }catch(e){}
    return false;
  }

  async function fetchAllFromSupabase(){
    const { data: lists, error: listErr } = await sb
      .from('lists').select('*').order('position', { ascending:true }).order('created_at', { ascending:true });
    if (listErr) throw listErr;

    const { data: items, error: itemErr } = await sb
      .from('items').select('*').order('position', { ascending:true }).order('created_at', { ascending:true });
    if (itemErr) throw itemErr;

    const byList = {};
    (items || []).forEach(it => {
      (byList[it.list_id] = byList[it.list_id] || []).push({
        id: it.id, name: it.name, qty: it.qty, price: it.price, done: it.done
      });
    });

    state.lists = (lists || []).map(l => ({ id: l.id, name: l.name, items: byList[l.id] || [] }));
  }

  async function load(){
    try{
      await Promise.all([fetchAllFromSupabase(), loadCategoryOverrides()]);
      if (state.lists.length === 0){
        const { data, error } = await sb.from('lists').insert({ name: 'Groceries' }).select().single();
        if (error) throw error;
        state.lists = [{ id: data.id, name: data.name, items: [] }];
      }
      cacheLocally();
    }catch(e){
      console.error('Supabase load failed, falling back to local cache', e);
      const hadCache = loadFromCache();
      if (!hadCache || !state.lists || state.lists.length === 0) state = defaultState();
      showToast('Offline — showing last saved copy');
    }
    if (!state.activeListId || !state.lists.find(l => l.id === state.activeListId)){
      state.activeListId = state.lists[0].id;
    }
    if (themeMem === 'dark') document.body.classList.add('dark');
    render();
  }

  function activeList(){ return state.lists.find(l => l.id === state.activeListId); }

  function renderTabs(){
    el.tabs.innerHTML = '';
    state.lists.forEach(list => {
      const wrap = document.createElement('div');
      wrap.className = 'tab-wrap' + (list.id === state.activeListId ? ' active' : '');

      const tab = document.createElement('button');
      tab.className = 'tab' + (list.id === state.activeListId ? ' active' : '');
      tab.textContent = list.name;
      tab.onclick = () => { state.activeListId = list.id; editingId = null; cacheLocally(); render(); };

      const editBtn = document.createElement('button');
      editBtn.className = 'tab-edit';
      editBtn.textContent = '⋯';
      editBtn.title = 'Edit list';
      editBtn.onclick = (e) => { e.stopPropagation(); openModal('manage', list.name, list.id); };

      wrap.appendChild(tab);
      wrap.appendChild(editBtn);
      el.tabs.appendChild(wrap);
    });
    const newTab = document.createElement('button');
    newTab.className = 'tab new';
    newTab.textContent = '+ New list';
    newTab.onclick = () => openModal('new');
    el.tabs.appendChild(newTab);
  }

  function renderList(){
    const list = activeList();
    el.listTitle.textContent = list.name.toUpperCase();
    const query = el.searchInput.value.trim().toLowerCase();
    el.searchClear.style.display = query ? 'block' : 'none';

    const items = list.items.filter(i => !query || i.name.toLowerCase().includes(query));

    el.listBody.innerHTML = '';
    if (list.items.length === 0){
      el.emptyMsg.style.display = 'block';
      el.emptyMsg.textContent = "List's empty. Add something below.";
    } else if (items.length === 0){
      el.emptyMsg.style.display = 'block';
      el.emptyMsg.textContent = 'No items match your search.';
    } else {
      el.emptyMsg.style.display = 'none';
      const groups = {};
      items.forEach(item => {
        const cat = categorize(item.name);
        if (!groups[cat.name]) groups[cat.name] = { icon: cat.icon, items: [] };
        groups[cat.name].items.push(item);
      });
      Object.keys(groups).sort((a,b) => CATEGORY_ORDER.indexOf(a) - CATEGORY_ORDER.indexOf(b)).forEach(catName => {
        const block = document.createElement('div');
        block.className = 'category-block';
        const title = document.createElement('div');
        title.className = 'category-title';
        title.textContent = `${groups[catName].icon} ${catName}`;
        block.appendChild(title);

        const ul = document.createElement('ul');
        groups[catName].items.forEach(item => ul.appendChild(renderItem(item)));
        block.appendChild(ul);
        el.listBody.appendChild(block);
      });
    }

    const remaining = list.items.filter(i => !i.done).length;
    const total = list.items.length;
    el.remainingCount.textContent = remaining;
    const pct = total === 0 ? 0 : Math.round(((total - remaining) / total) * 100);
    el.progressFill.style.width = pct + '%';
    el.progressPct.textContent = pct + '%';

    const costSum = list.items.reduce((s,i) => s + (i.price ? i.price * i.qty : 0), 0);
    el.costTotal.textContent = costSum > 0 ? `est. $${costSum.toFixed(2)}` : '';

    if (total > 0 && remaining === 0) fireConfetti();
  }

  function renderItem(item){
    const li = document.createElement('li');
    li.className = item.done ? 'done' : '';
    li.dataset.id = item.id;

    if (editingId === item.id){
      li.appendChild(renderEditRow(item));
      return li;
    }

    const content = document.createElement('div');
    content.className = 'li-content';

    const check = document.createElement('div');
    check.className = 'check' + (item.done ? ' done' : '');
    check.onclick = () => toggle(item.id);

    const main = document.createElement('div');
    main.className = 'item-main';
    main.onclick = () => toggle(item.id);
    const name = document.createElement('div');
    name.className = 'item-name';
    name.textContent = item.name;
    main.appendChild(name);
    if (item.price){
      const price = document.createElement('div');
      price.className = 'item-price';
      price.textContent = `$${item.price.toFixed(2)} × ${item.qty} = $${(item.price*item.qty).toFixed(2)}`;
      main.appendChild(price);
    }

    const stepper = document.createElement('div');
    stepper.className = 'qty-stepper';
    const minus = document.createElement('button');
    minus.textContent = '−';
    minus.onclick = (e) => { e.stopPropagation(); changeQty(item.id, -1); };
    const qtyVal = document.createElement('span');
    qtyVal.className = 'qty-val';
    qtyVal.textContent = item.qty;
    const plus = document.createElement('button');
    plus.textContent = '+';
    plus.onclick = (e) => { e.stopPropagation(); changeQty(item.id, 1); };
    stepper.appendChild(minus);
    stepper.appendChild(qtyVal);
    stepper.appendChild(plus);

    const edit = document.createElement('button');
    edit.className = 'edit-btn';
    edit.textContent = '✎';
    edit.title = 'Edit item';
    edit.onclick = (e) => { e.stopPropagation(); editingId = item.id; renderList(); };

    const remove = document.createElement('button');
    remove.className = 'remove';
    remove.textContent = '✕';
    remove.onclick = (e) => { e.stopPropagation(); removeItem(item.id); };

    content.appendChild(check);
    content.appendChild(main);
    content.appendChild(stepper);
    content.appendChild(edit);
    content.appendChild(remove);
    li.appendChild(content);

    return li;
  }

  function renderEditRow(item){
    const wrap = document.createElement('div');
    wrap.className = 'edit-row';

    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.className = 'edit-name';
    nameInput.value = item.name;

    const qtyInput = document.createElement('input');
    qtyInput.type = 'number';
    qtyInput.className = 'edit-qty';
    qtyInput.min = '1';
    qtyInput.value = item.qty;

    const priceInput = document.createElement('input');
    priceInput.type = 'number';
    priceInput.className = 'edit-price';
    priceInput.step = '0.01';
    priceInput.min = '0';
    priceInput.placeholder = '$';
    priceInput.value = item.price != null ? item.price : '';

    const categorySelect = document.createElement('select');
    categorySelect.className = 'edit-category';
    CATEGORY_RULES.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat.name;
      opt.textContent = `${cat.icon} ${cat.name}`;
      categorySelect.appendChild(opt);
    });
    const otherOpt = document.createElement('option');
    otherOpt.value = 'Other';
    otherOpt.textContent = '🛒 Other';
    categorySelect.appendChild(otherOpt);
    categorySelect.value = categorize(item.name).name;

    const fieldsRow = document.createElement('div');
    fieldsRow.className = 'edit-fields-row';
    fieldsRow.appendChild(nameInput);
    fieldsRow.appendChild(qtyInput);
    fieldsRow.appendChild(priceInput);

    const categoryRow = document.createElement('div');
    categoryRow.className = 'edit-category-row';
    categoryRow.appendChild(categorySelect);

    const btnRow = document.createElement('div');
    btnRow.className = 'edit-btn-row';

    const saveBtn = document.createElement('button');
    saveBtn.className = 'edit-save';
    saveBtn.type = 'button';
    saveBtn.textContent = 'SAVE';
    saveBtn.onclick = () => commitEdit(item.id, nameInput, qtyInput, priceInput, categorySelect);

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'edit-cancel';
    cancelBtn.type = 'button';
    cancelBtn.textContent = 'CANCEL';
    cancelBtn.onclick = () => { editingId = null; renderList(); };

    btnRow.appendChild(cancelBtn);
    btnRow.appendChild(saveBtn);

    wrap.appendChild(fieldsRow);
    wrap.appendChild(categoryRow);
    wrap.appendChild(btnRow);

    const keyHandler = (e) => {
      if (e.key === 'Enter' && e.target !== categorySelect) commitEdit(item.id, nameInput, qtyInput, priceInput, categorySelect);
      if (e.key === 'Escape') { editingId = null; renderList(); }
    };
    nameInput.addEventListener('keydown', keyHandler);
    qtyInput.addEventListener('keydown', keyHandler);
    priceInput.addEventListener('keydown', keyHandler);

    setTimeout(() => { nameInput.focus(); nameInput.select(); }, 30);

    return wrap;
  }

  async function commitEdit(id, nameInput, qtyInput, priceInput, categorySelect){
    const item = activeList().items.find(i => i.id === id);
    if (!item) return;
    const newName = nameInput.value.trim();
    if (newName) item.name = newName;
    const newQty = parseInt(qtyInput.value, 10);
    item.qty = isNaN(newQty) || newQty < 1 ? 1 : newQty;
    const newPrice = parseFloat(priceInput.value);
    item.price = isNaN(newPrice) ? null : newPrice;
    editingId = null;
    cacheLocally(); renderList();
    const { error } = await sb.from('items').update({ name: item.name, qty: item.qty, price: item.price }).eq('id', id);
    if (error){ console.error(error); showToast('Sync failed — change saved locally only'); }
    if (categorySelect && categorySelect.value !== categorize(item.name).name){
      await setCategoryOverride(item.name, categorySelect.value);
    }
  }

  async function toggle(id){
    const item = activeList().items.find(i => i.id === id);
    if (!item) return;
    item.done = !item.done;
    cacheLocally(); renderList();
    const { error } = await sb.from('items').update({ done: item.done }).eq('id', id);
    if (error){
      item.done = !item.done;
      cacheLocally(); renderList();
      showToast('Sync failed — try again');
    }
  }

  async function changeQty(id, delta){
    const item = activeList().items.find(i => i.id === id);
    if (!item) return;
    const prevQty = item.qty;
    item.qty = Math.max(1, item.qty + delta);
    cacheLocally(); renderList();
    const { error } = await sb.from('items').update({ qty: item.qty }).eq('id', id);
    if (error){
      item.qty = prevQty;
      cacheLocally(); renderList();
      showToast('Sync failed — try again');
    }
  }

  async function removeItem(id){
    const list = activeList();
    const idx = list.items.findIndex(i => i.id === id);
    if (idx === -1) return;
    const removed = list.items[idx];
    const listId = list.id;
    list.items.splice(idx, 1);
    cacheLocally(); renderList();

    const { error } = await sb.from('items').delete().eq('id', id);
    if (error){
      list.items.splice(idx, 0, removed);
      cacheLocally(); renderList();
      showToast('Could not remove item');
      return;
    }

    showToast('Item removed', async () => {
      const { data, error: insErr } = await sb.from('items')
        .insert({ list_id: listId, name: removed.name, qty: removed.qty, price: removed.price, done: removed.done })
        .select().single();
      if (!insErr && data){
        const l = state.lists.find(l => l.id === listId);
        if (l){
          l.items.splice(Math.min(idx, l.items.length), 0, { id: data.id, name: data.name, qty: data.qty, price: data.price, done: data.done });
          cacheLocally(); renderList();
        }
      }
    });
  }

  function showToast(msg, undoFn){
    el.toastMsg.textContent = msg;
    el.toast.classList.add('show');
    clearTimeout(toastTimer);
    el.toastUndo.style.display = undoFn ? '' : 'none';
    el.toastUndo.onclick = () => { undoFn && undoFn(); hideToast(); };
    toastTimer = setTimeout(hideToast, 4500);
  }
  function hideToast(){ el.toast.classList.remove('show'); }

  function render(){ renderTabs(); renderList(); }

  el.addForm.addEventListener('submit', async e => {
    e.preventDefault();
    const raw = el.itemInput.value.trim();
    if (!raw) return;
    const { qty, name } = parseQtyName(raw);
    const priceVal = parseFloat(el.priceInput.value);
    const price = isNaN(priceVal) ? null : priceVal;
    const list = activeList();
    el.itemInput.value = '';
    el.priceInput.value = '';
    const { data, error } = await sb.from('items')
      .insert({ list_id: list.id, name, qty, price, done: false })
      .select().single();
    if (error){
      console.error(error);
      showToast('Could not add item — check connection');
      return;
    }
    list.items.push({ id: data.id, name: data.name, qty: data.qty, price: data.price, done: data.done });
    cacheLocally(); renderList();
    el.itemInput.focus();
  });

  el.searchInput.addEventListener('input', renderList);
  el.searchClear.addEventListener('click', () => { el.searchInput.value=''; renderList(); });

  el.clearDoneBtn.addEventListener('click', async () => {
    const list = activeList();
    const removed = list.items.filter(i => i.done);
    if (removed.length === 0) return;
    const ids = removed.map(i => i.id);
    const listId = list.id;
    list.items = list.items.filter(i => !i.done);
    cacheLocally(); renderList();

    const { error } = await sb.from('items').delete().in('id', ids);
    if (error){
      list.items = list.items.concat(removed);
      cacheLocally(); renderList();
      showToast('Could not clear items');
      return;
    }

    showToast(`${removed.length} checked item(s) cleared`, async () => {
      const rows = removed.map(i => ({ list_id: listId, name: i.name, qty: i.qty, price: i.price, done: i.done }));
      const { data, error: insErr } = await sb.from('items').insert(rows).select();
      if (!insErr && data){
        const l = state.lists.find(l => l.id === listId);
        if (l){
          l.items = l.items.concat(data.map(d => ({ id: d.id, name: d.name, qty: d.qty, price: d.price, done: d.done })));
          cacheLocally(); renderList();
        }
      }
    });
  });

  el.shareBtn.addEventListener('click', async () => {
    const list = activeList();
    if (list.items.length === 0) return;
    const text = `${list.name}\n` + list.items.map(i => `${i.done ? '[x]' : '[ ]'} ${i.qty > 1 ? i.qty + 'x ' : ''}${i.name}${i.price ? ' — $' + (i.price*i.qty).toFixed(2) : ''}`).join('\n');
    if (navigator.share){
      try{ await navigator.share({ title: list.name, text }); return; }catch(e){}
    }
    try{ await navigator.clipboard.writeText(text); showToast('List copied to clipboard'); }
    catch(e){ showToast('Could not copy — try again'); }
  });

  el.themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    themeMem = document.body.classList.contains('dark') ? 'dark' : 'light';
    localStorage.setItem('pick-list-theme', themeMem);
  });

  function openModal(mode, current, listId){
    modalMode = mode;
    manageListId = listId || (activeList() && activeList().id);
    el.modalTitle.textContent = mode === 'new' ? 'New list' : (mode === 'manage' ? 'Edit list' : 'Rename list');
    el.modalInput.value = current || '';
    el.modalDeleteRow.style.display = mode === 'manage' ? 'flex' : 'none';
    el.modalOverlay.classList.add('show');
    setTimeout(() => el.modalInput.focus(), 50);
  }
  function closeModal(){ el.modalOverlay.classList.remove('show'); }

  el.modalCancel.addEventListener('click', closeModal);
  el.modalOverlay.addEventListener('click', e => { if (e.target === el.modalOverlay) closeModal(); });
  el.modalConfirm.addEventListener('click', async () => {
    const name = el.modalInput.value.trim();
    if (!name) return;
    if (modalMode === 'new'){
      const { data, error } = await sb.from('lists').insert({ name }).select().single();
      if (error){ console.error(error); showToast('Could not create list'); return; }
      const newList = { id: data.id, name: data.name, items: [] };
      state.lists.push(newList);
      state.activeListId = newList.id;
    } else if (modalMode === 'rename' || modalMode === 'manage'){
      const list = state.lists.find(l => l.id === manageListId) || activeList();
      list.name = name;
      const { error } = await sb.from('lists').update({ name }).eq('id', list.id);
      if (error){ console.error(error); showToast('Sync failed — rename saved locally only'); }
    }
    cacheLocally(); render(); closeModal();
  });
  el.modalInput.addEventListener('keydown', e => { if (e.key === 'Enter') el.modalConfirm.click(); });

  el.modalDelete.addEventListener('click', async () => {
    if (state.lists.length <= 1){ showToast("Can't delete your only list"); return; }
    const list = state.lists.find(l => l.id === manageListId);
    if (!list) return;
    if (!confirm(`Delete "${list.name}" and all its items? This can't be undone.`)) return;
    closeModal();
    const { error } = await sb.from('lists').delete().eq('id', list.id);
    if (error){ console.error(error); showToast('Could not delete list'); return; }
    state.lists = state.lists.filter(l => l.id !== list.id);
    if (state.activeListId === list.id) state.activeListId = state.lists[0].id;
    cacheLocally(); render();
  });

  let confettiFired = false;
  function fireConfetti(){
    if (confettiFired) return;
    confettiFired = true;
    const canvas = document.createElement('canvas');
    canvas.className = 'confetti';
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    const colors = ['#C99A3E','#6B8F71','#C1666B','#2B2B2B'];
    const pieces = Array.from({length:80}, () => ({
      x: Math.random()*canvas.width,
      y: -20 - Math.random()*200,
      r: 4 + Math.random()*4,
      c: colors[Math.floor(Math.random()*colors.length)],
      vy: 2 + Math.random()*3,
      vx: -1.5 + Math.random()*3,
      rot: Math.random()*360,
      vr: -6 + Math.random()*12,
    }));
    let frame = 0;
    function tick(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      pieces.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
        ctx.fillStyle = p.c; ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);
        ctx.restore();
      });
      frame++;
      if (frame < 110) requestAnimationFrame(tick);
      else { canvas.remove(); confettiFired = false; }
    }
    tick();
  }

  window.addEventListener('resize', () => {
    document.querySelectorAll('canvas.confetti').forEach(c => { c.width = window.innerWidth; c.height = window.innerHeight; });
  });

  // ---- PWA: service worker + auto-update ----
  if ('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then((reg) => {
        // Actively check for a newer sw.js right away, don't wait for the browser's own schedule
        reg.update().catch(() => {});
      }).catch(err => console.warn('SW registration failed', err));

      // The new service worker activates itself (skipWaiting + clients.claim in sw.js).
      // Reload once when that happens so this tab actually runs the new code.
      let refreshed = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshed) return;
        refreshed = true;
        window.location.reload();
      });
    });
  }

  const installBtn = document.getElementById('installBtn');
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
  });
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
  });
  window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });

  load();
})();
</script>

</body>
</html>
